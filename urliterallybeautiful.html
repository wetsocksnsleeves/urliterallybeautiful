<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageHeadTitle">urliterallybeautiful</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <div style="display: flex; align-items: center; gap: 8px; margin: 0 0 10px 0;">
                    <h1 id="pageTitle" class="page-title" contenteditable="true">My Board</h1>
                    <button class="copy-btn" onclick="copyURL()" title="Copy URL">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-copy" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M4 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zM2 5a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1h1v1a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h1v1z"/>
                        </svg>
                    </button>
                </div>
                <div class="stats-section" id="statsSection">
                    Items: <span id="statItems">0</span> | Raw: <span id="statRaw">0</span>B | Compressed: <span id="statCompressed">0</span>B | Limit: <span id="statPercent">0%</span>
                </div>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="settings-btn" id="settingsBtn" title="Settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-gear" viewBox="0 0 16 16">
                        <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492M5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0"/>
                        <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115z"/>
                    </svg>
                </button>
                <button class="toggle-btn" id="toggleBtn" title="Toggle">
                    <svg id="toggleOffIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M11 4a4 4 0 0 1 0 8H8a4.992 4.992 0 0 0 2-4 4.992 4.992 0 0 0-2-4h3zm-6 8a4 4 0 1 1 0-8 4 4 0 0 1 0 8zM0 8a5 5 0 0 0 5 5h6a5 5 0 0 0 0-10H5a5 5 0 0 0-5 5z"/>
                    </svg>
                    <svg id="toggleOnIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16" style="display: none;">
                        <path d="M5 3a5 5 0 0 0 0 10h6a5 5 0 0 0 0-10H5zm6 9a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="columns-container" id="columnsContainer">
            <div class="add-column-btn">
                <button class="add-column-button" onclick="addColumn()">+ Add Column</button>
            </div>
        </div>

    </div>

    <div id="settingsModalOverlay" class="row-modal-overlay" style="display: none;" onclick="closeSettingsModal()"></div>
    <div id="settingsModal" class="row-modal" style="display: none;">
        <div class="row-modal-header">
            <h2>Settings</h2>
            <button class="row-modal-close" onclick="closeSettingsModal()">×</button>
        </div>
        <div class="row-modal-content">
            <div class="settings-section">
                <label for="githubToken">GitHub Personal Access Token (optional)</label>
                <p class="settings-help">Allows fetching PR status from private repositories. <a href="https://github.com/settings/tokens" target="_blank">Create token</a> with <code>repo</code> scope.</p>
                <input type="password" id="githubToken" class="settings-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
                <button class="settings-save-btn" onclick="saveGitHubToken()">Save Token</button>
                <div id="tokenStatus" style="margin-top: 8px; font-size: 12px;"></div>
            </div>

            <div class="settings-section">
                <label>Board Data</label>
                <p class="settings-help">Export your board as JSON or import from a previously exported file.</p>
                <div style="display: flex; gap: 8px;">
                    <button class="settings-save-btn" onclick="exportBoardAsJSON()">Export as JSON</button>
                    <button class="settings-save-btn" onclick="document.getElementById('jsonImportInput').click()">Import from JSON</button>
                </div>
                <input type="file" id="jsonImportInput" accept=".json" style="display: none;" onchange="importBoardFromJSON(event)">
                <div id="importStatus" style="margin-top: 8px; font-size: 12px;"></div>
            </div>
        </div>
    </div>

    <div id="rowModalOverlay" class="row-modal-overlay" style="display: none;" onclick="closeRowModal()"></div>
    <div id="rowModal" class="row-modal" style="display: none;">
        <div class="row-modal-header">
            <h2 id="rowModalTitle" contenteditable="true"></h2>
            <button class="row-modal-close" onclick="closeRowModal()">×</button>
        </div>
        <div class="row-modal-content">
            <button id="editDescriptionBtn" class="edit-description-btn">Edit</button>
            <div id="rowModalContentDisplay"></div>
            <textarea id="rowModalContentEditable" class="row-modal-content-editable" placeholder="Enter description (supports markdown). Shift+Enter for newlines." style="display: none;"></textarea>
            <div class="row-modal-char-count" id="charCountContainer" style="display: none;"><span id="charCount">0</span>/200</div>
            <div class="row-modal-pr-section">
                <label for="rowModalPRLink">PR Link:</label>
                <input type="text" id="rowModalPRLink" class="row-modal-pr-input" placeholder="https://github.com/owner/repo/pull/123">
                <div class="pr-status" id="prStatus" style="display: none;"></div>
            </div>
        </div>
        <div class="row-modal-actions">
            <button class="delete-btn" onclick="deleteCurrentRow()">Delete</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
