<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageHeadTitle">urliterallybeautiful</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <h1 id="pageTitle" class="page-title" contenteditable="true">My Board</h1>
                    <button class="copy-btn" onclick="copyURL()" title="Copy URL">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-copy" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M4 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zM2 5a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1h1v1a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h1v1z"/>
                        </svg>
                    </button>
                </div>
                <div class="stats-section" id="statsSection">
                    Raw: <span id="statRaw">0</span> | Compressed: <span id="statCompressed">0</span> | Encoded: <span id="statEncoded">0</span> | Limit: <span id="statPercent">0%</span>
                </div>
            </div>
        </div>

        <div class="columns-container" id="columnsContainer">
            <div class="add-column-btn">
                <button class="add-column-button" onclick="addColumn()">+ Add Column</button>
            </div>
        </div>

    </div>

    <div id="rowModalOverlay" class="row-modal-overlay" style="display: none;" onclick="closeRowModal()"></div>
    <div id="rowModal" class="row-modal" style="display: none;">
        <div class="row-modal-header">
            <h2 id="rowModalTitle" contenteditable="true"></h2>
            <button class="row-modal-close" onclick="closeRowModal()">×</button>
        </div>
        <div class="row-modal-content">
            <div id="rowModalContentDisplay"></div>
            <div id="rowModalContentEditable" class="row-modal-content-editable" contenteditable="true" style="display: none;"></div>
            <div class="row-modal-char-count" id="charCountContainer" style="display: none;"><span id="charCount">0</span>/200</div>
        </div>
        <div class="row-modal-actions">
            <button class="delete-btn" onclick="deleteCurrentRow()">Delete</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
